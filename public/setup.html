<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카페24 API 설정</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0D10;--bg2:#14161B;--bg3:#1C1F26;--brd:#2E3140;--t1:#E8E6E1;--t2:#9B99A1;--t3:#6B6977;--grn:#4AE68A;--red:#F0605D;--blu:#5B9DF0;--r:14px;--mono:'SF Mono','Fira Code',monospace}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.page{max-width:640px;margin:0 auto;padding:40px 24px 80px}
a{color:var(--grn);text-decoration:none}a:hover{text-decoration:underline}
.header{margin-bottom:36px}
.header h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.header p{font-size:14px;color:var(--t2)}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:650;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--grn);box-shadow:0 0 0 3px rgba(74,230,138,.08)}
.field input::placeholder{color:var(--t3)}
.field .hint{font-size:11.5px;color:var(--t3);margin-top:4px}
.field .hint code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--grn);color:#0C0D10}.btn-g:hover{background:#3BC476}
.btn-s{background:var(--bg3);color:var(--t1);border:1px solid var(--brd)}.btn-s:hover{border-color:var(--t3)}
.btn-d{background:rgba(240,96,93,.1);color:var(--red)}.btn-d:hover{background:rgba(240,96,93,.18)}
.env-box{background:#0A0B0E;border:1px solid var(--brd);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--t2);white-space:pre-wrap;position:relative;margin-top:12px}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--brd);border-radius:6px;color:var(--t2);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}
.copy-btn:hover{border-color:var(--grn);color:var(--grn)}
.console{background:#0A0B0E;border:1px solid var(--brd);border-radius:8px;padding:14px;max-height:200px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.8;margin-top:12px}
.log{color:var(--t2)}.log.ok{color:var(--grn)}.log.err{color:var(--red)}.log.info{color:var(--blu)}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.st-item{background:var(--bg3);border-radius:8px;padding:12px}
.st-item .lb{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.st-item .vl{font-size:13px;font-weight:600;font-family:var(--mono)}
.vl.ok{color:var(--grn)}.vl.na{color:var(--t3)}.vl.err{color:var(--red)}.vl.warn{color:#F0B232}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);margin-bottom:20px}
.back:hover{color:var(--grn)}
@media(max-width:500px){.row{grid-template-columns:1fr}.status-grid{grid-template-columns:1fr}.btn-row{flex-direction:column}}
</style>
</head>
<body>
<div class="page">
<a href="/" class="back">← 대시보드로 돌아가기</a>
<div class="header">
<h1>🔑 API 연동 설정</h1>
<p>카페24 API 인증 정보를 입력하고 연결을 확인합니다.</p>
</div>

<div class="card">
<div class="card-title">📋 API 인증 정보</div>
<div class="field"><label>Mall ID</label><input type="text" id="mallId" placeholder="쇼핑몰 ID"><div class="hint">주소에서 확인: <code>https://여기.cafe24.com</code></div></div>
<div class="row">
<div class="field"><label>Client ID</label><input type="text" id="clientId" placeholder="Client ID"></div>
<div class="field"><label>Client Secret</label><input type="password" id="clientSecret" placeholder="Secret Key"></div>
</div>
<div class="field"><label>Redirect URI</label><input type="text" id="redirectUri" value="https://cafe24-sales-manager-production.up.railway.app/auth/callback"></div>
<div class="row">
<div class="field"><label>API Version</label><select id="apiVersion"><option value="2024-06-01" selected>2024-06-01</option><option value="2024-09-01">2024-09-01</option></select></div>
<div class="field"><label>Port</label><input type="number" id="port" value="3000"></div>
</div>
</div>

<div class="card">
<div class="card-title">📡 연결 상태</div>
<div class="status-grid">
<div class="st-item"><div class="lb">서버</div><div class="vl na" id="st-srv">—</div></div>
<div class="st-item"><div class="lb">인증</div><div class="vl na" id="st-auth">—</div></div>
<div class="st-item"><div class="lb">토큰 만료</div><div class="vl na" id="st-exp">—</div></div>
<div class="st-item"><div class="lb">API</div><div class="vl na" id="st-api">—</div></div>
</div>
<div class="console" id="con"><div class="log info">[시스템] 설정 정보를 입력하고 연결을 테스트하세요.</div></div>
</div>

<div class="btn-row">
<button class="btn btn-g" onclick="saveConfig()">💾 설정 저장</button>
<button class="btn btn-s" onclick="testConn()">🔌 연결 테스트</button>
<button class="btn btn-s" onclick="startAuth()">🔐 OAuth 인증</button>
<button class="btn btn-d" onclick="resetAll()">🗑 초기화</button>
</div>

<div class="card" style="margin-top:16px">
<div class="card-title">📄 생성된 .env 파일</div>
<p style="font-size:12px;color:var(--t2);margin-bottom:8px">Railway Variables 탭에 아래 값을 입력하세요.</p>
<div style="position:relative"><pre class="env-box" id="envOut"></pre><button class="copy-btn" onclick="copyEnv()">복사</button></div>
</div>
</div>

<script>
var K='cafe24_cfg';
function gv(){return{mallId:E('mallId').value.trim(),clientId:E('clientId').value.trim(),clientSecret:E('clientSecret').value.trim(),redirectUri:E('redirectUri').value.trim(),apiVersion:E('apiVersion').value,port:E('port').value};}
function E(id){return document.getElementById(id);}
function log(m,t){E('con').innerHTML+='<div class="log '+(t||'')+'">['+new Date().toLocaleTimeString('ko-KR')+'] '+m+'</div>';E('con').scrollTop=E('con').scrollHeight;}
function setSt(id,txt,cls){var e=E(id);e.textContent=txt;e.className='vl '+cls;}

function saveConfig(){
  var c=gv();
  if(!c.mallId||!c.clientId||!c.clientSecret){alert('Mall ID, Client ID, Secret을 모두 입력하세요.');return;}
  localStorage.setItem(K,JSON.stringify(c));
  updateEnv();
  log('설정이 저장되었습니다.','ok');
}

function loadConfig(){
  try{var c=JSON.parse(localStorage.getItem(K));if(c){if(c.mallId)E('mallId').value=c.mallId;if(c.clientId)E('clientId').value=c.clientId;if(c.clientSecret)E('clientSecret').value=c.clientSecret;if(c.redirectUri)E('redirectUri').value=c.redirectUri;if(c.apiVersion)E('apiVersion').value=c.apiVersion;if(c.port)E('port').value=c.port;log('저장된 설정을 불러왔습니다.','info');}}catch(e){}
}

function resetAll(){if(!confirm('초기화하시겠습니까?'))return;localStorage.removeItem(K);E('mallId').value='';E('clientId').value='';E('clientSecret').value='';E('redirectUri').value='https://cafe24-sales-manager-production.up.railway.app/auth/callback';updateEnv();log('초기화 완료','err');}

function updateEnv(){
  var c=gv();
  E('envOut').textContent='CAFE24_MALL_ID='+(c.mallId||'yourmall')+'\nCAFE24_CLIENT_ID='+(c.clientId||'your_client_id')+'\nCAFE24_CLIENT_SECRET='+(c.clientSecret||'your_secret')+'\nCAFE24_REDIRECT_URI='+c.redirectUri+'\nCAFE24_API_VERSION='+c.apiVersion+'\nPORT='+c.port;
}

function copyEnv(){navigator.clipboard.writeText(E('envOut').textContent).then(function(){document.querySelector('.copy-btn').textContent='복사됨';setTimeout(function(){document.querySelector('.copy-btn').textContent='복사';},1500);});}

function testConn(){
  log('연결 테스트 시작...','info');
  fetch('/auth/status').then(function(r){return r.json();}).then(function(d){
    setSt('st-srv','연결됨','ok');log('서버 연결 성공','ok');
    if(d.authenticated){setSt('st-auth','인증됨','ok');setSt('st-exp','유효','ok');log('OAuth 인증 상태: 유효','ok');}
    else{setSt('st-auth','미인증','warn');setSt('st-exp','—','na');log('OAuth 인증이 필요합니다.','err');}
    setSt('st-api','접근 가능','ok');
    log('연결 테스트 완료','info');
  }).catch(function(e){setSt('st-srv','오프라인','err');log('서버 연결 실패: '+e.message,'err');});
}

function startAuth(){window.open('/auth/login','_blank');log('OAuth 인증 페이지로 이동합니다...','info');}

var fields=['mallId','clientId','clientSecret','redirectUri','apiVersion','port'];
for(var i=0;i<fields.length;i++){E(fields[i]).addEventListener('input',updateEnv);}
loadConfig();
updateEnv();
</script>
</body>
</html>
