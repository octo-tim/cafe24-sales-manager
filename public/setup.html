<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 설정 - 멀티채널 판매관리</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0D10;--bg2:#14161B;--bg3:#1C1F26;--brd:#2E3140;--t1:#E8E6E1;--t2:#9B99A1;--t3:#6B6977;--grn:#4AE68A;--red:#F0605D;--blu:#5B9DF0;--r:14px;--mono:'SF Mono','Fira Code',monospace;--c24:#3266ad;--cpg:#e24b4a;--nvr:#1d9e75}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
.page{max-width:700px;margin:0 auto;padding:40px 24px 80px}
a{color:var(--grn);text-decoration:none}a:hover{text-decoration:underline}
.header{margin-bottom:36px}.header h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}.header p{font-size:14px;color:var(--t2)}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:24px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:650;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ch-label{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;color:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--t1);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--grn);box-shadow:0 0 0 3px rgba(74,230,138,.08)}
.field input::placeholder{color:var(--t3)}
.field .hint{font-size:11.5px;color:var(--t3);margin-top:4px}
.field .hint code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--grn);color:#0C0D10}.btn-s{background:var(--bg3);color:var(--t1);border:1px solid var(--brd)}.btn-d{background:rgba(240,96,93,.1);color:var(--red)}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.st-item{background:var(--bg3);border-radius:8px;padding:12px}
.st-item .lb{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.st-item .vl{font-size:13px;font-weight:600;font-family:var(--mono)}
.vl.ok{color:var(--grn)}.vl.na{color:var(--t3)}.vl.err{color:var(--red)}.vl.warn{color:#F0B232}
.console{background:#0A0B0E;border:1px solid var(--brd);border-radius:8px;padding:14px;max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.8;margin-top:12px}
.log{color:var(--t2)}.log.ok{color:var(--grn)}.log.err{color:var(--red)}.log.info{color:var(--blu)}
.env-box{background:#0A0B0E;border:1px solid var(--brd);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--t2);white-space:pre-wrap;position:relative;margin-top:12px}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--brd);border-radius:6px;color:var(--t2);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);margin-bottom:20px}
@media(max-width:500px){.row{grid-template-columns:1fr}.status-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
<a href="/" class="back">← 대시보드</a>
<div class="header"><h1>API 연동 설정</h1><p>카페24 · 쿠팡 · 네이버 API 인증 정보를 관리합니다.</p></div>

<!-- 카페24 -->
<div class="card">
<div class="card-title"><span class="ch-label" style="background:var(--c24)">카페24</span> 카페24 Admin API</div>
<div class="field"><label>Mall ID</label><input type="text" id="mallId" placeholder="쇼핑몰 ID"><div class="hint">주소에서 확인: <code>https://여기.cafe24.com</code></div></div>
<div class="row">
<div class="field"><label>Client ID</label><input type="text" id="clientId" placeholder="Client ID"></div>
<div class="field"><label>Client Secret</label><input type="password" id="clientSecret" placeholder="Secret Key"></div>
</div>
<div class="field"><label>Redirect URI</label><input type="text" id="redirectUri" value="http://localhost:3000/auth/callback"></div>
<div class="btn-row"><button class="btn btn-g" onclick="startAuth()">OAuth 인증 시작</button></div>
</div>

<!-- 쿠팡 -->
<div class="card">
<div class="card-title"><span class="ch-label" style="background:var(--cpg)">쿠팡</span> 쿠팡 Wing API</div>
<div class="field"><label>Vendor ID</label><input type="text" id="cpVendor" placeholder="판매자 ID"></div>
<div class="row">
<div class="field"><label>Access Key</label><input type="text" id="cpAccess" placeholder="Access Key"></div>
<div class="field"><label>Secret Key</label><input type="password" id="cpSecret" placeholder="Secret Key"></div>
</div>
<div class="hint" style="font-size:11px;color:var(--t3)">쿠팡 Wing → 개발자센터에서 API 키를 발급받으세요.</div>
</div>

<!-- 네이버 -->
<div class="card">
<div class="card-title"><span class="ch-label" style="background:var(--nvr)">네이버</span> 네이버 커머스 API</div>
<div class="row">
<div class="field"><label>Client ID</label><input type="text" id="nvClientId" placeholder="애플리케이션 Client ID"></div>
<div class="field"><label>Client Secret</label><input type="password" id="nvSecret" placeholder="Client Secret"></div>
</div>
<div class="hint" style="font-size:11px;color:var(--t3)">네이버 커머스 API 센터에서 애플리케이션을 등록하세요.</div>
</div>

<!-- 연결 상태 -->
<div class="card">
<div class="card-title">연결 상태</div>
<div class="status-grid">
<div class="st-item"><div class="lb">카페24</div><div class="vl na" id="st-c24">—</div></div>
<div class="st-item"><div class="lb">쿠팡</div><div class="vl na" id="st-cpg">—</div></div>
<div class="st-item"><div class="lb">네이버</div><div class="vl na" id="st-nvr">—</div></div>
</div>
<div class="btn-row">
<button class="btn btn-s" onclick="testAll()">전체 연결 테스트</button>
<button class="btn btn-g" onclick="saveAll()">설정 저장</button>
<button class="btn btn-d" onclick="resetAll()">초기화</button>
</div>
<div class="console" id="con"><div class="log info">[시스템] 각 채널의 API 정보를 입력하고 연결을 테스트하세요.</div></div>
</div>

<!-- .env 출력 -->
<div class="card">
<div class="card-title">.env 환경변수</div>
<p style="font-size:12px;color:var(--t2);margin-bottom:8px">서버 배포 시 아래 환경변수를 설정하세요.</p>
<div style="position:relative"><pre class="env-box" id="envOut"></pre><button class="copy-btn" onclick="copyEnv()">복사</button></div>
</div>
</div>

<script>
var E=function(id){return document.getElementById(id)};
function log(m,t){E('con').innerHTML+='<div class="log '+(t||'')+'">['+ new Date().toLocaleTimeString('ko-KR')+'] '+m+'</div>';E('con').scrollTop=E('con').scrollHeight}
function setSt(id,txt,cls){var e=E(id);e.textContent=txt;e.className='vl '+cls}

function updateEnv(){
  var c24='CAFE24_MALL_ID='+(E('mallId').value||'yourmall')+'\nCAFE24_CLIENT_ID='+(E('clientId').value||'')+'\nCAFE24_CLIENT_SECRET='+(E('clientSecret').value||'')+'\nCAFE24_REDIRECT_URI='+E('redirectUri').value;
  var cpg='\n\nCOUPANG_VENDOR_ID='+(E('cpVendor').value||'')+'\nCOUPANG_ACCESS_KEY='+(E('cpAccess').value||'')+'\nCOUPANG_SECRET_KEY='+(E('cpSecret').value||'');
  var nvr='\n\nNAVER_COMMERCE_CLIENT_ID='+(E('nvClientId').value||'')+'\nNAVER_COMMERCE_CLIENT_SECRET='+(E('nvSecret').value||'');
  E('envOut').textContent=c24+cpg+nvr+'\n\nPORT=3000';
}

function saveAll(){
  var data={mallId:E('mallId').value,clientId:E('clientId').value,clientSecret:E('clientSecret').value,redirectUri:E('redirectUri').value,cpVendor:E('cpVendor').value,cpAccess:E('cpAccess').value,cpSecret:E('cpSecret').value,nvClientId:E('nvClientId').value,nvSecret:E('nvSecret').value};
  localStorage.setItem('mc_cfg',JSON.stringify(data));updateEnv();log('전체 설정 저장 완료','ok');
}

function loadAll(){
  try{var d=JSON.parse(localStorage.getItem('mc_cfg'));if(d){for(var k in d){var el=E(k);if(el&&d[k])el.value=d[k]}log('저장된 설정 로드','info')}}catch(e){}
}

function resetAll(){if(!confirm('초기화?'))return;localStorage.removeItem('mc_cfg');['mallId','clientId','clientSecret','cpVendor','cpAccess','cpSecret','nvClientId','nvSecret'].forEach(function(id){E(id).value=''});updateEnv();log('초기화 완료','err')}

function testAll(){
  log('전체 채널 연결 테스트...','info');
  fetch('/auth/status').then(function(r){return r.json()}).then(function(d){
    if(d.success&&d.channels){
      d.channels.forEach(function(ch){
        var id=ch.channel==='카페24'?'st-c24':ch.channel==='쿠팡'?'st-cpg':'st-nvr';
        if(ch.authenticated&&ch.valid){setSt(id,'연결됨','ok');log(ch.channel+' 연결 성공','ok')}
        else if(ch.authenticated){setSt(id,'만료','warn');log(ch.channel+' 토큰 만료','err')}
        else{setSt(id,'미설정','na');log(ch.channel+' 미설정','info')}
      });
    }
  }).catch(function(e){log('서버 연결 실패: '+e.message,'err');setSt('st-c24','오프라인','err')});
}

function startAuth(){window.open('/auth/login','_blank');log('카페24 OAuth 인증 페이지 이동...','info')}
function copyEnv(){navigator.clipboard.writeText(E('envOut').textContent).then(function(){document.querySelector('.copy-btn').textContent='복사됨';setTimeout(function(){document.querySelector('.copy-btn').textContent='복사'},1500)})}

['mallId','clientId','clientSecret','redirectUri','cpVendor','cpAccess','cpSecret','nvClientId','nvSecret'].forEach(function(id){E(id).addEventListener('input',updateEnv)});
loadAll();updateEnv();
</script>
</body>
</html>
